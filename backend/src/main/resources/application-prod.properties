# ── PRODUCTION CONFIG FOR RAILWAY ────────────────────────────────────────────
# File location: backend/src/main/resources/application-prod.properties
# IMPORTANT: filename must be exactly "application-prod.properties"
#            NOT "application-prod.properties.properties"
#
# This file is safe to commit — contains NO real secrets.
# All ${VARIABLE} values are injected by Railway at runtime.
# Set them in: Railway Dashboard → your service → Variables tab

# ── Database (Railway MySQL auto-provides these 5 variables) ─────────────────
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Server (Railway injects PORT automatically) ───────────────────────────────
server.port=${PORT:8080}

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# ── Razorpay ──────────────────────────────────────────────────────────────────
# CORRECT
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# ── CORS ──────────────────────────────────────────────────────────────────────
allowed.origin=${ALLOWED_ORIGIN:http://localhost:5173}