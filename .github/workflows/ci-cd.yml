name: CI/CD Pipeline — Luxe Shop

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Test & Build Backend ──────────────────────────
  backend-ci:
    name: Backend — Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        working-directory: ./backend
        run: mvn test --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Build JAR (skip tests, already ran)
        working-directory: ./backend
        run: mvn package -DskipTests --no-transfer-progress

      - name: Confirm JAR was created
        working-directory: ./backend
        run: ls target/*.jar

  # ── Job 2: Build Frontend ─────────────────────────────────
  frontend-ci:
    name: Frontend — Install & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://ecommerce-backend-xuka.onrender.com/api
  # ── Job 3: Deploy (only on push to main, not PRs) ─────────
  deploy:
    name: Trigger Railway Deploy
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Railway redeploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deploy triggered successfully"